  type: Method
  assemblies:
  - SuperOffice.WebApi
  namespace: SuperOffice.WebApi.Agents
  summary: Saves a new item to the newsfeed, publishing it to the specified users.
  example: []
  syntax:
    content: Task<NewsFeedItem> PostNewsFeedItemAsync(NewsFeedItem newsFeedItem, int[] toAssociateIds, int[] toGroupIds, bool toAll, RequestOptions requestOptions = null)
    parameters:
    - id: newsFeedItem
      type: SuperOffice.WebApi.Data.NewsFeedItem
      description: The news feed item to post. NewsFeedItemId is ignored, as a new id will be generated when posting to the newsfeed.
    - id: toAssociateIds
      type: System.Int32[]
      description: List of associate ids that this news feed item is sent to.
    - id: toGroupIds
      type: System.Int32[]
      description: List of group ids that this news feed item is sent to. This gets resolved to associate ids when posted.
    - id: toAll
      type: System.Boolean
      description: Indicates if this news feed item is sent to all users. Gets resolved into all users when posted.
    - id: requestOptions
      type: SuperOffice.WebApi.RequestOptions
      description: Override language/culture codes on this request.
    return:
      type: System.Threading.Tasks.Task{SuperOffice.WebApi.Data.NewsFeedItem}
      description: The news feed item that was posted, including its new id.
    content.vb: Function PostNewsFeedItemAsync(newsFeedItem As NewsFeedItem, toAssociateIds As Integer(), toGroupIds As Integer(), toAll As Boolean, requestOptions As RequestOptions = Nothing) As Task(Of NewsFeedItem)
