  type: Method
  assemblies:
  - SuperOffice.Services.Implementation
  namespace: SuperOffice.CRM.Services
  summary: Saves a new item to the newsfeed, publishing it to the specified users.
  example: []
  syntax:
    content: public Task<NewsFeedItem> PostNewsFeedItemAsync(NewsFeedItem newsFeedItem, int[] toAssociateIds, int[] toGroupIds, bool toAll, CancellationToken cancellationToken = default)
    parameters:
    - id: newsFeedItem
      type: SuperOffice.CRM.Services.NewsFeedItem
      description: The news feed item to post. NewsFeedItemId is ignored, as a new id will be generated when posting to the newsfeed.
    - id: toAssociateIds
      type: System.Int32[]
      description: List of associate ids that this news feed item is sent to.
    - id: toGroupIds
      type: System.Int32[]
      description: List of group ids that this news feed item is sent to. This gets resolved to associate ids when posted.
    - id: toAll
      type: System.Boolean
      description: Indicates if this news feed item is sent to all users. Gets resolved into all users when posted.
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: This operation <b>cannot</b> be cancelled; the cancellationToken parameter is ignored
    return:
      type: System.Threading.Tasks.Task{SuperOffice.CRM.Services.NewsFeedItem}
      description: The news feed item that was posted, including its new id.
    content.vb: Public Function PostNewsFeedItemAsync(newsFeedItem As NewsFeedItem, toAssociateIds As Integer(), toGroupIds As Integer(), toAll As Boolean, cancellationToken As CancellationToken = Nothing) As Task(Of NewsFeedItem)
