  - SuperOffice.Services
  namespace: SuperOffice.CRM.Services
  summary: >-
    Interface for the CustomObject Agent

    Agent for working with Custom Objects (extra tables): read schema and full CRUD over rows. Purpose-built replacement for using DatabaseTableAgent against custom objects.

    <p></p>

    <b>Experimental:</b> The CustomObject agent is experimental, subject to change, and not intended for partners.
  example:
  - >-
    <pre><code class="lang-csharp">using SuperOffice;

    using SuperOffice.CRM.Services;


    using (SoSession mySession = SoSession.Authenticate("user", "pass"))

    {
       using (CustomObjectAgent agent = new CustomObjectAgent())
       {
          // call methods on agent here...
       }
    }</code></pre>
  syntax:
    content: >-
      [Agent("CustomObject Agent", "Interface for the CustomObject Agent. Agent for working with Custom Objects (extra tables): read schema and full CRUD over rows. Purpose-built replacement for using DatabaseTableAgent against custom objects.")]

      public interface ICustomObjectAgent : IAgent
    content.vb: >-
      <Agent("CustomObject Agent", "Interface for the CustomObject Agent. Agent for working with Custom Objects (extra tables): read schema and full CRUD over rows. Purpose-built replacement for using DatabaseTableAgent against custom objects.")>

      Public Interface ICustomObjectAgent Inherits IAgent
