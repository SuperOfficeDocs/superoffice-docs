  summary: >-
    Returns a new Custom Object row pre-populated with the default values declared by the Custom Object Definition. The row is not yet persisted.

    <p></p>

    <b>Experimental:</b> The operation is experimental, subject to change, and not intended for partners.
  example: []
  syntax:
    content: Task<CustomObject> CreateDefaultCustomObjectAsync(string definitionName, CancellationToken cancellationToken = default)
    parameters:
    - id: definitionName
      type: System.String
      description: Database table name of the Custom Object Definition, e.g. 'y_equipment'.
    - id: cancellationToken
      type: System.Threading.CancellationToken
    return:
      type: System.Threading.Tasks.Task{SuperOffice.CRM.Services.CustomObject}
      description: A new Custom Object row pre-populated with default values. Not yet persisted.
    content.vb: Function CreateDefaultCustomObjectAsync(definitionName As String, cancellationToken As CancellationToken = Nothing) As Task(Of CustomObject)
