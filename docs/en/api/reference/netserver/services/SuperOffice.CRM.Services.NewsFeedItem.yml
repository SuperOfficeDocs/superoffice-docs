  name: NewsFeedItem
  nameWithType: NewsFeedItem
  fullName: SuperOffice.CRM.Services.NewsFeedItem
  type: Class
  assemblies:
  - SuperOffice.Services
  namespace: SuperOffice.CRM.Services
  summary: >-
    News feed items are created by agents or other services for display on the start page and other relevant places in the UI.

    <p></p>

    Carrier object for NewsFeedItem.

    Services for the NewsFeedItem Carrier is available from the <xref href="SuperOffice.CRM.Services.INewsFeedAgent?text=NewsFeed+Agent" data-throw-if-not-resolved="false"></xref>.
  example:
  - >-
    Get NewsFeedItem 123 using the agent:

    <pre><code class="lang-csharp">using SuperOffice;

    using SuperOffice.CRM.Services;


    using (SoSession mySession = SoSession.Authenticate("user", "pass"))

    {
       var agent = new NewsFeedAgent();
       var newsFeedItem = agent.GetNewsFeedItem( 123 );
    }</code></pre>


    Find all NewsFeedItem, get related items using archive agent.

    <pre><code class="lang-csharp">var archive = new ArchiveAgent();

    var rows = archive.GetArchiveListByColumns2("NewsFeedItem", "...", null, "getAllRows eq 1", null, 0, 100 );</code></pre>
  syntax:
    content: >-
      [DataContract(Namespace = "http://www.superoffice.net/ws/crm/NetServer/12.2.0.0")]

      public class NewsFeedItem
    content.vb: >-
      <DataContract(Namespace:="http://www.superoffice.net/ws/crm/NetServer/12.2.0.0")>

