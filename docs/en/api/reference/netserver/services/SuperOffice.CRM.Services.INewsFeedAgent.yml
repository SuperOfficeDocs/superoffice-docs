  namespace: SuperOffice.CRM.Services
  summary: >-
    Get a list of newsfeed items for a particular user between two dates. If the current user cannot access a particular item, it will be excluded from the results.

    <p></p>

    <b>Experimental:</b> The operation is experimental, subject to change, and not intended for partners.
  example: []
  syntax:
    content: Task<NewsFeedItem[]> GetNewsItemsForUserAsync(int associateId, DateTime fromDate, DateTime toDate, int top, int skip, CancellationToken cancellationToken = default)
    parameters:
    - id: associateId
      type: System.Int32
      description: Id of the associate to fetch news feed items for. 0 = current user
    - id: fromDate
      type: System.DateTime
      description: Start date for fetching news feed items.
    - id: toDate
      type: System.DateTime
      description: End date for fetching news feed items.
    - id: top
      type: System.Int32
      description: Maximum number of news feed items to return.
    - id: skip
      type: System.Int32
      description: Number of news feed items to skip for paging.
    - id: cancellationToken
      type: System.Threading.CancellationToken
    return:
      type: System.Threading.Tasks.Task{SuperOffice.CRM.Services.NewsFeedItem[]}
      description: The news feed items that was posted, or null if not found/not accessible by the user.
    content.vb: Function GetNewsItemsForUserAsync(associateId As Integer, fromDate As Date, toDate As Date, top As Integer, skip As Integer, cancellationToken As CancellationToken = Nothing) As Task(Of NewsFeedItem())
  overload: SuperOffice.CRM.Services.INewsFeedAgent.GetNewsItemsForUserAsync*
