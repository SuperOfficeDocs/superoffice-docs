  summary: >-
    Interface for the NewsFeed Agent

    Posting and reading Newsfeed items, marking them as read or as handled.

    <p></p>

    <b>Experimental:</b> The NewsFeed agent is experimental, subject to change, and not intended for partners.
  example:
  - >-
    <pre><code class="lang-csharp">using SuperOffice;

    using SuperOffice.CRM.Services;


    using (SoSession mySession = SoSession.Authenticate("user", "pass"))

    {
       using (NewsFeedAgent agent = new NewsFeedAgent())
       {
          // call methods on agent here...
       }
    }</code></pre>
  syntax:
    content: >-
      [Agent("NewsFeed Agent", "Interface for the NewsFeed Agent. Posting and reading Newsfeed items, marking them as read or as handled.")]

      public interface INewsFeedAgent : IAgent
    content.vb: >-
      <Agent("NewsFeed Agent", "Interface for the NewsFeed Agent. Posting and reading Newsfeed items, marking them as read or as handled.")>

      Public Interface INewsFeedAgent Inherits IAgent
