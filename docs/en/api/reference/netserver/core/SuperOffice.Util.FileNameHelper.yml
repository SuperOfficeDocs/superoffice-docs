  name: InvalidFileNameChars
  nameWithType: FileNameHelper.InvalidFileNameChars
  fullName: SuperOffice.Util.FileNameHelper.InvalidFileNameChars
  type: Field
  assemblies:
  - SoCore
  namespace: SuperOffice.Util
  summary: >-
    The Windows set of invalid filename characters, applied on every platform.

    Path.GetInvalidFileNameChars() is OS-dependent (on Linux it is only '/' and NUL), but the

    document archive keeps Windows filename rules everywhere so that names are portable.
  example: []
  syntax:
    content: public static readonly char[] InvalidFileNameChars
    return:
      type: System.Char[]
    content.vb: Public Shared ReadOnly InvalidFileNameChars As Char()
