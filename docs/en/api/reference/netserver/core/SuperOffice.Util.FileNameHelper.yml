- uid: SuperOffice.Util.FileNameHelper.GetFileNameAnyPlatform(System.String)
  commentId: M:SuperOffice.Util.FileNameHelper.GetFileNameAnyPlatform(System.String)
  id: GetFileNameAnyPlatform(System.String)
  parent: SuperOffice.Util.FileNameHelper
  langs:
  - csharp
  - vb
  name: GetFileNameAnyPlatform(string)
  nameWithType: FileNameHelper.GetFileNameAnyPlatform(string)
  fullName: SuperOffice.Util.FileNameHelper.GetFileNameAnyPlatform(string)
  type: Method
  assemblies:
  - SoCore
  namespace: SuperOffice.Util
  summary: >-
    Get the file name (last segment) of a path, treating both '/' and '\' as directory separators

    regardless of host OS. Path.GetFileName does not strip Windows-style directories on Linux,

    but Windows clients send such paths to Linux servers.
  example: []
  syntax:
    content: public static string GetFileNameAnyPlatform(string path)
    parameters:
    - id: path
      type: System.String
      description: A file name, optionally prefixed by a path in either separator style
    return:
      type: System.String
      description: The file name without any directory or drive designator
    content.vb: Public Shared Function GetFileNameAnyPlatform(path As String) As String
  overload: SuperOffice.Util.FileNameHelper.GetFileNameAnyPlatform*
  nameWithType.vb: FileNameHelper.GetFileNameAnyPlatform(String)
  fullName.vb: SuperOffice.Util.FileNameHelper.GetFileNameAnyPlatform(String)
  name.vb: GetFileNameAnyPlatform(String)
