- uid: SuperOffice.IO.Files.FileLookup.ResolveFileIgnoreCase(System.String)
  commentId: M:SuperOffice.IO.Files.FileLookup.ResolveFileIgnoreCase(System.String)
  id: ResolveFileIgnoreCase(System.String)
  parent: SuperOffice.IO.Files.FileLookup
  langs:
  - csharp
  - vb
  name: ResolveFileIgnoreCase(string)
  nameWithType: FileLookup.ResolveFileIgnoreCase(string)
  fullName: SuperOffice.IO.Files.FileLookup.ResolveFileIgnoreCase(string)
  type: Method
  assemblies:
  - SoCore
  namespace: SuperOffice.IO.Files
  summary: >-
    Resolve a file path to the path of an existing file, falling back to a case-insensitive

    match of the file name on non-Windows platforms. Database content may not match the

    on-disk casing, which is harmless on Windows but fatal on e.g. ext4.
  example: []
  syntax:
    content: public static string ResolveFileIgnoreCase(string fullPath)
    parameters:
    - id: fullPath
      type: System.String
      description: Full path of the wanted file
    return:
      type: System.String
      description: Path to an existing file - possibly with different casing of the file name - or null if not found
    content.vb: Public Shared Function ResolveFileIgnoreCase(fullPath As String) As String
