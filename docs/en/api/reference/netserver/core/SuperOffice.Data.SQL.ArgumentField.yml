  langs:
  - csharp
  - vb
  name: ArgumentField
  nameWithType: ArgumentField
  fullName: SuperOffice.Data.SQL.ArgumentField
  type: Class
  assemblies:
  - SoDataBase
  namespace: SuperOffice.Data.SQL
  summary: >-
    A <xref href="SuperOffice.Data.SQL.FieldInfo" data-throw-if-not-resolved="false"></xref> facade over a composite SQL expression (a <code>CONCAT</code>,

    a <code>CASE</code>, an <code>ArgumentFunction</code>, or anything else built from <xref href="SuperOffice.Data.SQL.Argument" data-throw-if-not-resolved="false"></xref>s).
  remarks: >-
    Lets a derived value participate in the column/restriction machinery (return fields,

    archive list bindings, <code>RestrictionOperations</code>, dialect rendering) as if it were

    a regular field on <code>Parent</code>, while keeping the underlying expression accessible

    through <xref href="SuperOffice.Data.SQL.ArgumentField.WrappedArgument" data-throw-if-not-resolved="false"></xref>. The wrapper carries the SELECT alias and inherits

    the wrapped argument's <xref href="SuperOffice.Data.SQL.Argument.DataType" data-throw-if-not-resolved="false"></xref>; it has no dictionary

    <xref href="SuperOffice.Data.SQL.FieldInfo.Definition" data-throw-if-not-resolved="false"></xref> (<code>HasNoDefinition</code> is set), so callers that need

    the dictionary-level type must read it via the SoField on the underlying field.

    <p></p>

    Operator methods (<xref href="SuperOffice.Data.SQL.ArgumentField.Equal(SuperOffice.Data.SQL.Argument)" data-throw-if-not-resolved="false"></xref>, <xref href="SuperOffice.Data.SQL.ArgumentField.Like(SuperOffice.Data.SQL.Argument)" data-throw-if-not-resolved="false"></xref>, <xref href="SuperOffice.Data.SQL.ArgumentField.Between(SuperOffice.Data.SQL.Argument%2cSuperOffice.Data.SQL.Argument)" data-throw-if-not-resolved="false"></xref>, etc.)

    build restrictions against the wrapped expression rather than the wrapper, so the SQL

    applies the predicate to the composite value and not to the synthetic alias column.
  example: []
