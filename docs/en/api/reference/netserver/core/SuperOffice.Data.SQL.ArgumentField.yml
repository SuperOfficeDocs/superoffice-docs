  namespace: SuperOffice.Data.SQL
  summary: returns a new instance of the IsNull operator, that determines whether this computed field is null.
  remarks: >-
    Unlike the comparison operators, this passes <code>this</code> (the wrapper) rather than the

    <code>_wrappedArgument</code>: <xref href="SuperOffice.Data.SQL.NullOperators" data-throw-if-not-resolved="false"></xref> only accepts a <xref href="SuperOffice.Data.SQL.FieldInfo" data-throw-if-not-resolved="false"></xref>

    as its left operand, and the wrapped argument (e.g. a <xref href="SuperOffice.Data.SQL.Concat" data-throw-if-not-resolved="false"></xref>) is not one.

    SQL is still correct because <code>ToSql(ArgumentField)</code> expands to the wrapped expression,

    yielding <code>(&lt;expression&gt;) IS NULL</code>.
