    content: 'public sealed class ArgumentField : FieldInfo, ICloneable, IEquatable<FieldInfo>'
    content.vb: Public NotInheritable Class ArgumentField Inherits FieldInfo Implements ICloneable, IEquatable(Of FieldInfo)
