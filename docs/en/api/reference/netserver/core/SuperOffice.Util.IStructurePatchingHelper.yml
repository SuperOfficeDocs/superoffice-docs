items:
- uid: SuperOffice.Util.IStructurePatchingHelper
  commentId: T:SuperOffice.Util.IStructurePatchingHelper
  id: IStructurePatchingHelper
  parent: SuperOffice.Util
  children:
  - SuperOffice.Util.IStructurePatchingHelper.ApplyActions(System.Object,System.Attribute[],System.String,System.Collections.Generic.Dictionary{System.Type,SuperOffice.Util.TypeAction},System.Action{System.Object})
  - SuperOffice.Util.IStructurePatchingHelper.ApplyActions(System.Object,System.Collections.Generic.Dictionary{System.Type,SuperOffice.Util.TypeAction},System.Action{System.Object})
  langs:
  - csharp
  - vb
  name: IStructurePatchingHelper
  nameWithType: IStructurePatchingHelper
  fullName: SuperOffice.Util.IStructurePatchingHelper
  type: Interface
  assemblies:
  - SoCore
  namespace: SuperOffice.Util
  summary: >-
    Iterate over a complex data structure. Unroll arrays and dictionaries; recurse class members.

    Only look at public Properties that can read/write, and public instance fields.

    Used for Carrier data patching in WebApi.
  remarks: >-
    Implementations cache per-<xref href="System.Type" data-throw-if-not-resolved="false"></xref> reflection metadata and compiled accessors,

    so the cost of visiting a given Carrier type is paid only once per process.

    <br />

    This is a somewhat-specialized case of the Visitor pattern, with the implementation iterating

    over a data structure and dispatching based on element type.
  example: []
  syntax:
    content: public interface IStructurePatchingHelper
    content.vb: Public Interface IStructurePatchingHelper
  extensionMethods:
  - SuperOffice.Util.IStructurePatchingHelper.EnumUtil.MapEnums``2
  - SuperOffice.Util.IStructurePatchingHelper.SuperOffice.ErpSync.ConnectorWS.Converters.MapEnums``2
- uid: SuperOffice.Util.IStructurePatchingHelper.ApplyActions(System.Object,System.Collections.Generic.Dictionary{System.Type,SuperOffice.Util.TypeAction},System.Action{System.Object})
  commentId: M:SuperOffice.Util.IStructurePatchingHelper.ApplyActions(System.Object,System.Collections.Generic.Dictionary{System.Type,SuperOffice.Util.TypeAction},System.Action{System.Object})
  id: ApplyActions(System.Object,System.Collections.Generic.Dictionary{System.Type,SuperOffice.Util.TypeAction},System.Action{System.Object})
  parent: SuperOffice.Util.IStructurePatchingHelper
  langs:
  - csharp
  - vb
  name: ApplyActions(object, Dictionary<Type, TypeAction>, Action<object>)
  nameWithType: IStructurePatchingHelper.ApplyActions(object, Dictionary<Type, TypeAction>, Action<object>)
  fullName: SuperOffice.Util.IStructurePatchingHelper.ApplyActions(object, System.Collections.Generic.Dictionary<System.Type, SuperOffice.Util.TypeAction>, System.Action<object>)
  type: Method
  assemblies:
  - SoCore
  namespace: SuperOffice.Util
  summary: >-
    Top-level entry point. Iterate over a complex data structure starting from <code class="paramref">root</code>; unroll arrays and

    dictionaries, recurse class members. The root carries no outer decorations and no element name - use the other

    overload when re-entering the visitor from inside a containing walk that has already collected those.
  example: []
  syntax:
    content: void ApplyActions(object root, Dictionary<Type, TypeAction> actions, Action<object> overwriteValue)
    parameters:
    - id: root
      type: System.Object
      description: The root element, typically a Carrier object; but can be an array, a simple type, or anything
    - id: actions
      type: System.Collections.Generic.Dictionary{System.Type,SuperOffice.Util.TypeAction}
      description: >-
        Types that should trigger actions, mapped to a function that takes a value object + decorations
                    and returns an amended value. The trigger types should be simple types - not sequences or classes as these are the
                    things that are traversed
    - id: overwriteValue
      type: System.Action{System.Object}
      description: Client-supplied method that performs the actual overwrite of the original value, with a patched value
    content.vb: Sub ApplyActions(root As Object, actions As Dictionary(Of Type, TypeAction), overwriteValue As Action(Of Object))
  overload: SuperOffice.Util.IStructurePatchingHelper.ApplyActions*
  nameWithType.vb: IStructurePatchingHelper.ApplyActions(Object, Dictionary(Of Type, TypeAction), Action(Of Object))
  fullName.vb: SuperOffice.Util.IStructurePatchingHelper.ApplyActions(Object, System.Collections.Generic.Dictionary(Of System.Type, SuperOffice.Util.TypeAction), System.Action(Of Object))
  name.vb: ApplyActions(Object, Dictionary(Of Type, TypeAction), Action(Of Object))
- uid: SuperOffice.Util.IStructurePatchingHelper.ApplyActions(System.Object,System.Attribute[],System.String,System.Collections.Generic.Dictionary{System.Type,SuperOffice.Util.TypeAction},System.Action{System.Object})
  commentId: M:SuperOffice.Util.IStructurePatchingHelper.ApplyActions(System.Object,System.Attribute[],System.String,System.Collections.Generic.Dictionary{System.Type,SuperOffice.Util.TypeAction},System.Action{System.Object})
  id: ApplyActions(System.Object,System.Attribute[],System.String,System.Collections.Generic.Dictionary{System.Type,SuperOffice.Util.TypeAction},System.Action{System.Object})
  parent: SuperOffice.Util.IStructurePatchingHelper
  langs:
  - csharp
  - vb
  name: ApplyActions(object, Attribute[], string, Dictionary<Type, TypeAction>, Action<object>)
  nameWithType: IStructurePatchingHelper.ApplyActions(object, Attribute[], string, Dictionary<Type, TypeAction>, Action<object>)
  fullName: SuperOffice.Util.IStructurePatchingHelper.ApplyActions(object, System.Attribute[], string, System.Collections.Generic.Dictionary<System.Type, SuperOffice.Util.TypeAction>, System.Action<object>)
  type: Method
  assemblies:
  - SoCore
  namespace: SuperOffice.Util
  summary: >-
    Continuation entry point used when the caller already holds element-level metadata (decorations + name) from an outer

    walk and needs to re-enter the visitor for a sub-element. Equivalent to the top-level overload, but forwards the

    supplied <code class="paramref">decorations</code> and <code class="paramref">name</code> into the type-action callbacks for this element.
  example: []
  syntax:
    content: void ApplyActions(object element, Attribute[] decorations, string name, Dictionary<Type, TypeAction> actions, Action<object> overwriteValue)
    parameters:
    - id: element
      type: System.Object
      description: The element to descend into - typically a Carrier object; but can be an array, a simple type, or anything
    - id: decorations
      type: System.Attribute[]
      description: Custom attributes belonging to the element, as collected by the outer walk
    - id: name
      type: System.String
      description: Name of the element, as collected by the outer walk - mostly useful for debugging
    - id: actions
      type: System.Collections.Generic.Dictionary{System.Type,SuperOffice.Util.TypeAction}
      description: >-
        Types that should trigger actions, mapped to a function that takes a value object + decorations
                    and returns an amended value
    - id: overwriteValue
      type: System.Action{System.Object}
      description: Client-supplied method that performs the actual overwrite of the original value, with a patched value
    content.vb: Sub ApplyActions(element As Object, decorations As Attribute(), name As String, actions As Dictionary(Of Type, TypeAction), overwriteValue As Action(Of Object))
  overload: SuperOffice.Util.IStructurePatchingHelper.ApplyActions*
  nameWithType.vb: IStructurePatchingHelper.ApplyActions(Object, Attribute(), String, Dictionary(Of Type, TypeAction), Action(Of Object))
  fullName.vb: SuperOffice.Util.IStructurePatchingHelper.ApplyActions(Object, System.Attribute(), String, System.Collections.Generic.Dictionary(Of System.Type, SuperOffice.Util.TypeAction), System.Action(Of Object))
  name.vb: ApplyActions(Object, Attribute(), String, Dictionary(Of Type, TypeAction), Action(Of Object))
