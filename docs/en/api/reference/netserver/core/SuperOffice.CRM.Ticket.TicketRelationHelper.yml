- uid: SuperOffice.CRM.Ticket.TicketRelationHelper.EvaluateTicketRelationActionsAsync(System.Int32,System.Threading.CancellationToken)
  commentId: M:SuperOffice.CRM.Ticket.TicketRelationHelper.EvaluateTicketRelationActionsAsync(System.Int32,System.Threading.CancellationToken)
  id: EvaluateTicketRelationActionsAsync(System.Int32,System.Threading.CancellationToken)
  parent: SuperOffice.CRM.Ticket.TicketRelationHelper
  langs:
  - csharp
  - vb
  name: EvaluateTicketRelationActionsAsync(int, CancellationToken)
  nameWithType: TicketRelationHelper.EvaluateTicketRelationActionsAsync(int, CancellationToken)
  fullName: SuperOffice.CRM.Ticket.TicketRelationHelper.EvaluateTicketRelationActionsAsync(int, System.Threading.CancellationToken)
  type: Method
  assemblies:
  - SoDataBase
  namespace: SuperOffice.CRM.Ticket
  summary: >-
    Determines whether a ticket can be closed based on its related tickets and returns the IDs of any related

    tickets that prevent or offer closure.

    If the ticket can be closed, list of child tickets that offer closure is returned.

    If the ticket can be closed, checking maybe it is the last not closed child of another ticket, which based on definition rules should be offered to be closed too.
  example: []
  syntax:
    content: public static Task<(bool CanCloseTicket, List<int> Children, int TicketIdToClose)> EvaluateTicketRelationActionsAsync(int ticketId, CancellationToken cancellationToken)
    parameters:
    - id: ticketId
      type: System.Int32
      description: Ticket ID, 0 if ticket is new
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: A token to monitor for cancellation requests.
    return:
      type: System.Threading.Tasks.Task{System.ValueTuple{System.Boolean,System.Collections.Generic.List{System.Int32},System.Int32}}
      description: 'A tuple containing three elements: boolean which indicates whether the ticket can be closed, a list of child ticket IDs, and an ID of parent ticket if it should be closed.'
    content.vb: Public Shared Function EvaluateTicketRelationActionsAsync(ticketId As Integer, cancellationToken As CancellationToken) As Task(Of (CanCloseTicket As Boolean, Children As List(Of Integer), TicketIdToClose As Integer))
  overload: SuperOffice.CRM.Ticket.TicketRelationHelper.EvaluateTicketRelationActionsAsync*
