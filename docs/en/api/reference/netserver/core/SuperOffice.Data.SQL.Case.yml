  namespace: SuperOffice.Data.SQL
  summary: >-
    Represents a SQL searched CASE expression with one or more WHEN/THEN branches

    and an optional ELSE.
  remarks: >-
    <p>

    Generates SQL of the form:

    <pre><code class="lang-csharp">CASE
        WHEN condition1 THEN result1
        WHEN condition2 THEN result2
        ...
        [ELSE elseResult]
    END</code></pre>

    Conditions are evaluated sequentially; the first true condition determines the result.

    If no condition matches and no ELSE is provided, SQL returns NULL.

    </p>

    <p>

    All THEN and ELSE arguments must have the same <xref href="SuperOffice.Data.FieldDataType" data-throw-if-not-resolved="false"></xref>. The

    DataType of the CASE expression is inherited from the first THEN branch.

    </p>

    <p>

    Parameters inside the CASE expression are always rendered as <code>@Pn</code> placeholders,

    even when the CASE appears in a SELECT clause (where parameters would normally be

    inlined). The <xref href="SuperOffice.Data.Dialect.Dialect" data-throw-if-not-resolved="false"></xref> temporarily switches to

    SqlSection.Restriction mode while rendering the CASE to achieve this.

    </p>

    <p>

    To construct a CASE expression, use the fluent builder via the factory:

    <pre><code class="lang-csharp">S.FieldExpression.Case()
        .When(condition1, result1)
        .When(condition2, result2)
        .Else(elseResult)</code></pre>
    </p>
  example: []
