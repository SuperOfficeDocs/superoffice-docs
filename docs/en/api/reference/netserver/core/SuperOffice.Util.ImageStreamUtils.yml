  name: FitToPngBytes(Stream, int, int)
  nameWithType: ImageStreamUtils.FitToPngBytes(Stream, int, int)
  fullName: SuperOffice.Util.ImageStreamUtils.FitToPngBytes(System.IO.Stream, int, int)
  type: Method
  assemblies:
  - SoCore
  namespace: SuperOffice.Util
  summary: >-
    Synchronous companion to <xref href="SuperOffice.Util.ImageStreamUtils.FitToAsync(System.IO.Stream%2cSystem.Int32%2cSystem.Int32%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref>. Resizes the input image to fit within the

    given bounds while preserving aspect ratio, and returns the result as PNG-encoded bytes.

    Always re-encodes as PNG regardless of the input format. Returns null if input is null.
