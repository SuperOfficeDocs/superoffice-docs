- uid: SuperOffice.Util.ImageStreamUtils.GetTransparentPixelPng
  commentId: M:SuperOffice.Util.ImageStreamUtils.GetTransparentPixelPng
  id: GetTransparentPixelPng
  parent: SuperOffice.Util.ImageStreamUtils
  langs:
  - csharp
  - vb
  name: GetTransparentPixelPng()
  nameWithType: ImageStreamUtils.GetTransparentPixelPng()
  fullName: SuperOffice.Util.ImageStreamUtils.GetTransparentPixelPng()
  type: Method
  assemblies:
  - SoCore
  namespace: SuperOffice.Util
  summary: >-
    Returns a 1×1 fully transparent PNG as bytes. Useful as a fallback for missing or invalid

    images. A fresh copy is returned on every call, so callers may freely mutate the result

    without affecting the process-wide cached source.
  example: []
  syntax:
    content: public static byte[] GetTransparentPixelPng()
    return:
      type: System.Byte[]
    content.vb: Public Shared Function GetTransparentPixelPng() As Byte()
  overload: SuperOffice.Util.ImageStreamUtils.GetTransparentPixelPng*
- uid: SuperOffice.Util.ImageStreamUtils.GetNoPhotoPng
  commentId: M:SuperOffice.Util.ImageStreamUtils.GetNoPhotoPng
  id: GetNoPhotoPng
  parent: SuperOffice.Util.ImageStreamUtils
  langs:
  - csharp
  - vb
  name: GetNoPhotoPng()
  nameWithType: ImageStreamUtils.GetNoPhotoPng()
  fullName: SuperOffice.Util.ImageStreamUtils.GetNoPhotoPng()
  type: Method
  assemblies:
  - SoCore
  namespace: SuperOffice.Util
  summary: >-
    Returns the product-wide "no photo" placeholder (a person silhouette) as PNG bytes,

    loaded once from an embedded resource and cached. Used as the visible fallback for the

    <code>SrNoPhoto</code> / <code>SrNoPhotoWithBorder</code> strategies on the cross-platform image path,

    replacing the GDI+-rendered "NO PHOTO" text image. A fresh copy is returned on every call,

    so callers may freely mutate the result without affecting the process-wide cached source.
  example: []
  syntax:
    content: public static byte[] GetNoPhotoPng()
    return:
      type: System.Byte[]
    content.vb: Public Shared Function GetNoPhotoPng() As Byte()
  overload: SuperOffice.Util.ImageStreamUtils.GetNoPhotoPng*
