  summary: >-
    Async variant of <xref href="SuperOffice.Security.Principal.INSAuthenticator.Authenticate(System.Collections.Generic.IEnumerable%7bSystem.Security.Claims.ClaimsIdentity%7d)" data-throw-if-not-resolved="false"></xref>. Yields the calling thread during identity

