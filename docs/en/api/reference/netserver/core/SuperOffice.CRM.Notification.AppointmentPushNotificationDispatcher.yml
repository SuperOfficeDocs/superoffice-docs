  - vb
  name: AppointmentPushNotificationDispatcher
  nameWithType: AppointmentPushNotificationDispatcher
  fullName: SuperOffice.CRM.Notification.AppointmentPushNotificationDispatcher
  type: Class
  assemblies:
  - SoDataBase.BusinessLogic
  namespace: SuperOffice.CRM.Notification
  summary: >-
    Hosted service that drains the appointment push-notification queue produced by

    <xref href="SuperOffice.CRM.Entities.AppointmentMatrix" data-throw-if-not-resolved="false"></xref> and sends the notifications via

    <xref href="SuperOffice.CRM.Notification.NotificationEventHandler" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    Sending push notifications involves a call to an external service (Central Services) per

    recipient device, each taking from tens of milliseconds up to several seconds. Previously this

    was done sequentially on the save/delete request thread; moving it here both decouples it from

    the originating request and lets the recipients of a single appointment be processed in

    parallel. Concurrency is deliberately bounded (<xref href="SuperOffice.CRM.Notification.AppointmentPushNotificationDispatcher.MaxDegreeOfParallelism" data-throw-if-not-resolved="false"></xref>) to avoid

    overwhelming / being throttled by the external service.

    <p></p>

    Each send does database-scoped work (resolving caches, reading device rows). Because several

    run concurrently, each is dispatched through <xref href="SuperOffice.Threading.TaskHelper.RunInUserContext(System.Action%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> so it

    gets its own service-provider scope and re-signed user rather than sharing request/database

    scoped state - the established pattern for parallel database work in this codebase.
  example: []
  syntax:
    content: 'public class AppointmentPushNotificationDispatcher : AsyncQueueProcessor<IAsyncQueue<AppointmentPushNotificationTask>, AppointmentPushNotificationTask>, IDisposable, IHostedService'
