  name: AppointmentPushNotificationTask
  nameWithType: AppointmentPushNotificationTask
  fullName: SuperOffice.CRM.Notification.AppointmentPushNotificationTask
  type: Class
  assemblies:
  - SoDataBase.BusinessLogic
  namespace: SuperOffice.CRM.Notification
  summary: >-
    A batch of Mobile push notifications to send for a single appointment save/delete,

    queued for background processing so the originating save/delete request does not have

    to wait for the (potentially slow) external Central Services calls to complete.
  remarks: >-
    Built synchronously from the live appointment matrix in

    <xref href="SuperOffice.CRM.Entities.AppointmentMatrix" data-throw-if-not-resolved="false"></xref> (the matrix is cleared right after

    notifications are triggered, so the recipients must be snapshotted before enqueueing), and

    processed by <xref href="SuperOffice.CRM.Notification.AppointmentPushNotificationDispatcher" data-throw-if-not-resolved="false"></xref>. The current tenant and user

    are captured by the queue on enqueue and re-established before processing.
