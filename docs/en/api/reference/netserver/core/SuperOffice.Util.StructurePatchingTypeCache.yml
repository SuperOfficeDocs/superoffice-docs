  namespace: SuperOffice.Util
  summary: Per-<xref href="System.Type" data-throw-if-not-resolved="false"></xref> reflection cache used by <xref href="SuperOffice.Util.IStructurePatchingHelper" data-throw-if-not-resolved="false"></xref> implementations.
  remarks: >-
    Concrete Carrier types are emitted by a dev-time pre-compile step; there is no runtime type

    emission tied to tenant metadata. The <xref href="System.Type" data-throw-if-not-resolved="false"></xref>-to-descriptor mapping is therefore

    immutable for the lifetime of the process and identical across tenants, so this cache is

    registered as a process-wide singleton.
