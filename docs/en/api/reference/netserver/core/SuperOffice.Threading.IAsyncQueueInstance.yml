  summary: >-
    Wait for items that are currently being processed (in-flight) to complete.

    Unlike <xref href="SuperOffice.Threading.IAsyncQueueInstance.WaitForItemsInQueueToBeProcessedAsync(System.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref>, this does NOT wait

    for items still sitting in the queue.
