  nameWithType: AsyncQueueTracker.WaitForAllQueuesAsync(CancellationToken)
  fullName: SuperOffice.Threading.AsyncQueueTracker.WaitForAllQueuesAsync(System.Threading.CancellationToken)
  type: Method
  assemblies:
  - SoCore
  namespace: SuperOffice.Threading
  summary: Iteratively wait for all tracked queues to be fully drained.
  remarks: >-
    Draining one queue may cause items to be enqueued in another queue, so this method

    repeats until every queue reports <xref href="SuperOffice.Threading.IAsyncQueueInstance.HasItemsInTheQueue" data-throw-if-not-resolved="false"></xref> as false.
  example: []
  syntax:
    content: public Task WaitForAllQueuesAsync(CancellationToken cancellationToken = default)
    parameters:
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: ''
    return:
      type: System.Threading.Tasks.Task
      description: ''
    content.vb: Public Function WaitForAllQueuesAsync(cancellationToken As CancellationToken = Nothing) As Task
  overload: SuperOffice.Threading.AsyncQueueTracker.WaitForAllQueuesAsync*
