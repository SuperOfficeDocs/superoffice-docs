  type: Method
  assemblies:
  - SoCore
  namespace: SuperOffice.Threading
  summary: >-
    Wait for items that are currently being processed (in-flight) across all tracked queues.

    Does NOT wait for items still sitting in queues, making it safe to call after processors

    have been stopped.
  example: []
  syntax:
    content: public Task WaitForInFlightItemsAsync(CancellationToken cancellationToken = default)
