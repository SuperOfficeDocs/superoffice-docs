  namespace: SuperOffice.Threading
  summary: Singleton registry that tracks all <xref href="SuperOffice.Threading.IAsyncQueueInstance" data-throw-if-not-resolved="false"></xref> instances created by the DI container.
  remarks: >-
    Each <xref href="SuperOffice.Threading.AsyncQueueBase%601" data-throw-if-not-resolved="false"></xref> self-registers with this tracker upon construction,

    making it possible to enumerate all concrete queue instances at runtime even though they

    are registered as open generics.
